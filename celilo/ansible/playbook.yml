---
- name: Deploy Moview app host
  hosts: all
  become: true
  vars:
    moview_app_dir: /opt/moview
    moview_db_dir: /var/lib/moview
    moview_service_user: moview
  tasks:
    - name: Install runtime packages
      ansible.builtin.apt:
        name:
          - bash
          - ca-certificates
          - curl
          - unzip
        state: present
        update_cache: true

    - name: Install Bun runtime
      ansible.builtin.shell: |
        set -euo pipefail
        if ! command -v bun >/dev/null 2>&1; then
          curl -fsSL https://bun.sh/install | bash
          ln -sf /root/.bun/bin/bun /usr/local/bin/bun
        fi
      args:
        executable: /bin/bash
        creates: /usr/local/bin/bun

    - name: Create Moview service user
      ansible.builtin.user:
        name: "{{ moview_service_user }}"
        home: "{{ moview_db_dir }}"
        create_home: true
        system: true
        shell: /usr/sbin/nologin

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ moview_app_dir }}"
        owner: "{{ moview_service_user }}"
        group: "{{ moview_service_user }}"
        mode: "0755"
        state: directory

    - name: Copy backend package
      ansible.builtin.copy:
        src: "{{ build_artifacts_dir }}/backend/"
        dest: "{{ moview_app_dir }}/backend/"
        owner: "{{ moview_service_user }}"
        group: "{{ moview_service_user }}"
        mode: preserve

    - name: Copy Bun lockfile
      ansible.builtin.copy:
        src: "{{ build_artifacts_dir }}/bun.lock"
        dest: "{{ moview_app_dir }}/backend/bun.lock"
        owner: "{{ moview_service_user }}"
        group: "{{ moview_service_user }}"
        mode: "0644"

    - name: Install backend dependencies
      ansible.builtin.command: bun install --frozen-lockfile --production
      args:
        chdir: "{{ moview_app_dir }}/backend"
      become_user: "{{ moview_service_user }}"

    - name: Seed story data for smoke-test users
      ansible.builtin.command: bun run src/db/seed-cli.ts
      args:
        chdir: "{{ moview_app_dir }}/backend"
      become_user: "{{ moview_service_user }}"
      environment:
        DATABASE_URL: "file:{{ moview_db_dir }}/moview.sqlite"
        MOVIEW_MODE: dev

    - name: Install Moview systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/moview.service
        mode: "0644"
        content: |
          [Unit]
          Description=Moview backend
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ moview_service_user }}
          Group={{ moview_service_user }}
          WorkingDirectory={{ moview_app_dir }}/backend
          Environment=MOVIEW_MODE=production
          Environment=HOST=0.0.0.0
          Environment=PORT={{ service_port }}
          Environment=DATABASE_URL=file:{{ moview_db_dir }}/moview.sqlite
          Environment=AUTHENTIK_ISSUER={{ authentik_auth_url }}/application/o/moview/
          ExecStart=/usr/local/bin/bun run index.ts
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target

    - name: Start Moview backend
      ansible.builtin.systemd:
        name: moview
        daemon_reload: true
        enabled: true
        state: restarted
