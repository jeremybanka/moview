# yaml-language-server: $schema=./node_modules/@celilo/cli/schemas/module-manifest.schema.json
celilo_contract: "1.0"
id: moview
name: Moview
version: 0.1.0
version_source:
  kind: changeset
description: Movie-night pool, queue, reviews, and history for friend groups.
requires:
  capabilities:
    - name: public_web
      version: "1.0"
    - name: idp
      version: "1.0"
  systems:
    - name: app
      resources:
        type: lxc
        zone: app
        cpu: 2
        memory: 2048
        disk: 20
variables:
  owns:
    - name: DOMAIN_NAME
      type: string
      required: true
      source: user
      default: www.moview.com
      description: Public hostname served through the public_web capability.
    - name: MOVIEW_MODE
      type: string
      required: true
      source: user
      default: authentik
      description: Runtime mode. Deployed modules use Authentik.
    - name: AUTHENTIK_GROUP_CLAIM
      type: string
      required: true
      source: user
      default: groups
      description: Access JWT claim containing Authentik group names.
secrets:
  declares:
    - name: TMDB_API_KEY
      type: string
      required: true
      description: TMDB bearer token managed externally by Celilo.
    - name: MOVIEW_ADMIN_PASSWORD
      type: string
      required: true
      generate:
        method: random
        length: 32
        encoding: base64
      description: Initial operator-visible admin bootstrap password.
hooks:
  on_install:
    script: celilo/scripts/on_install.ts
    timeout: 600
  on_backup:
    script: celilo/scripts/on_backup.ts
    timeout: 300
  on_restore:
    script: celilo/scripts/on_restore.ts
    timeout: 300
  health_check:
    script: celilo/scripts/health_check.ts
    timeout: 120
